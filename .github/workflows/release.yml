name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: open-db-mcp-linux
          - os: macos-latest
            target: macos
            artifact_name: open-db-mcp-macos
          - os: windows-latest
            target: windows
            artifact_name: open-db-mcp-windows.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build executable
        run: uv run pyinstaller packaging/build_current.spec --clean --noconfirm

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/open-db-mcp dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path "dist/open-db-mcp.exe" -Destination "dist/${{ matrix.artifact_name }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/binary-linux/* release-assets/
          cp artifacts/binary-macos/* release-assets/
          cp artifacts/binary-windows/* release-assets/
          ls -la release-assets/

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE=""
          else
            RANGE="$PREV_TAG..."
          fi
          {
            echo "## What's Changed"
            echo ""
            git log ${RANGE}HEAD --pretty=format:"- %s" --no-merges
            echo ""
            echo ""
            echo "Full Changelog: \`${RANGE}${{ github.ref_name }}\`"
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-assets/*
