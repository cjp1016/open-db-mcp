name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Build sdist and wheel
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/

  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: open-db-mcp-linux
          - os: macos-latest
            target: macos
            artifact_name: open-db-mcp-macos
          - os: windows-latest
            target: windows
            artifact_name: open-db-mcp-windows.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install PyInstaller
        run: uv pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build executable
        run: uv run pyinstaller packaging/build_current.spec --clean --noconfirm

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/open-db-mcp dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path "dist/open-db-mcp.exe" -Destination "dist/${{ matrix.artifact_name }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: [build-package, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/python-packages/* release-assets/
          cp artifacts/binary-linux/* release-assets/
          cp artifacts/binary-macos/* release-assets/
          cp artifacts/binary-windows/* release-assets/
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
